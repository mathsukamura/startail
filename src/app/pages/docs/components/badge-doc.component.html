<div>
  <h1 class="text-2xl font-bold text-foreground">Badge</h1>
  <p class="mt-2 text-sm text-muted-foreground">Indicadores compactos para status, contagem ou categorias.</p>


  <div class="mt-8">
    <h2 class="text-sm font-medium text-muted-foreground mb-3">Preview</h2>
    <div class="rounded-lg border border-border bg-card p-6">
    
      <div class="mb-6">
        <p class="mb-3 text-xs font-medium text-muted-foreground">Solid</p>
        <div class="flex flex-wrap items-center gap-2">
          <span class="inline-flex items-center rounded-full bg-primary px-2.5 py-0.5 text-xs font-medium text-primary-foreground">Primary</span>
          <span class="inline-flex items-center rounded-full bg-emerald-500 px-2.5 py-0.5 text-xs font-medium text-white">Success</span>
          <span class="inline-flex items-center rounded-full bg-red-500 px-2.5 py-0.5 text-xs font-medium text-white">Error</span>
          <span class="inline-flex items-center rounded-full bg-amber-500 px-2.5 py-0.5 text-xs font-medium text-white">Warning</span>
        </div>
      </div>

    
      <div>
        <p class="mb-3 text-xs font-medium text-muted-foreground">Light</p>
        <div class="flex flex-wrap items-center gap-2">
          <span class="inline-flex items-center rounded-full border border-border bg-secondary px-2.5 py-0.5 text-xs font-medium text-secondary-foreground">Default</span>
          <span class="inline-flex items-center rounded-full border border-emerald-500/20 bg-emerald-500/10 px-2.5 py-0.5 text-xs font-medium text-emerald-600 dark:text-emerald-400">Success</span>
          <span class="inline-flex items-center rounded-full border border-red-500/20 bg-red-500/10 px-2.5 py-0.5 text-xs font-medium text-red-600 dark:text-red-400">Error</span>
          <span class="inline-flex items-center rounded-full border border-amber-500/20 bg-amber-500/10 px-2.5 py-0.5 text-xs font-medium text-amber-600 dark:text-amber-400">Warning</span>
        </div>
      </div>
    </div>
  </div>


  <div class="mt-6">
    <h2 class="text-sm font-medium text-muted-foreground mb-3">Codigo</h2>
    <app-code-block [code]="exampleCode" language="html" />
  </div>
</div>
