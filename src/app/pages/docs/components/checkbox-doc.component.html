<div>
  <h1 class="text-2xl font-bold text-foreground">Checkbox</h1>
  <p class="mt-2 text-sm text-muted-foreground">Controle de selecao binaria para formularios, listas e configuracoes.</p>


  <div class="mt-8">
    <h2 class="text-sm font-medium text-muted-foreground mb-3">Preview</h2>
    <div class="rounded-lg border border-border bg-card p-6 space-y-4">
    
      <label class="flex items-center gap-3 cursor-pointer">
        <input type="checkbox" class="size-4 rounded border-input accent-primary" />
        <span class="text-sm text-foreground">Aceitar termos de uso</span>
      </label>

    
      <label class="flex items-center gap-3 cursor-pointer">
        <input type="checkbox" checked class="size-4 rounded border-input accent-primary" />
        <span class="text-sm text-foreground">Receber notificacoes por email</span>
      </label>

    
      <label class="flex items-start gap-3 cursor-pointer">
        <input type="checkbox" class="mt-0.5 size-4 rounded border-input accent-primary" />
        <div>
          <span class="text-sm font-medium text-foreground">Marketing</span>
          <p class="text-xs text-muted-foreground">Receba emails sobre novos produtos e atualizacoes.</p>
        </div>
      </label>

    
      <label class="flex items-center gap-3 cursor-not-allowed opacity-50">
        <input type="checkbox" disabled class="size-4 rounded border-input" />
        <span class="text-sm text-muted-foreground">Opcao desabilitada</span>
      </label>

    
      <label class="flex items-center gap-3 cursor-not-allowed opacity-50">
        <input type="checkbox" checked disabled class="size-4 rounded border-input" />
        <span class="text-sm text-muted-foreground">Opcao desabilitada (marcada)</span>
      </label>
    </div>
  </div>


  <div class="mt-6">
    <h2 class="text-sm font-medium text-muted-foreground mb-3">Codigo</h2>
    <app-code-block [code]="exampleCode" language="html" />
  </div>
</div>
