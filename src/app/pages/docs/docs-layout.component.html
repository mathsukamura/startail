<div class="pt-14 min-h-screen bg-background">

  <div class="sticky top-14 z-30 flex items-center border-b border-border bg-background/80 px-4 py-2 backdrop-blur-lg lg:hidden">
    <button
      (click)="toggleSidebar()"
      class="inline-flex items-center gap-2 rounded-md px-3 py-1.5 text-sm text-muted-foreground hover:bg-accent hover:text-foreground"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      Menu
    </button>
  </div>

  <div class="mx-auto max-w-6xl lg:flex">
  
    @if (sidebarOpen) {
      <div
        (click)="closeSidebar()"
        class="fixed inset-0 z-40 bg-background/80 backdrop-blur-sm lg:hidden"
      ></div>
    }

  
    <aside
      [class]="sidebarOpen
        ? 'fixed inset-y-0 left-0 z-50 w-64 translate-x-0 border-r border-border bg-background pt-14 transition-transform lg:sticky lg:top-14 lg:z-0 lg:block lg:h-[calc(100vh-3.5rem)] lg:pt-0'
        : 'fixed inset-y-0 left-0 z-50 w-64 -translate-x-full border-r border-border bg-background pt-14 transition-transform lg:sticky lg:top-14 lg:z-0 lg:block lg:h-[calc(100vh-3.5rem)] lg:translate-x-0 lg:pt-0'"
    >
      <nav class="h-full overflow-y-auto px-4 py-6">
        @for (group of navGroups; track group.title) {
          <div class="mb-6">
            <h4 class="mb-2 px-2 text-xs font-semibold uppercase tracking-wider text-muted-foreground">
              {{ group.title }}
            </h4>
            <ul class="space-y-0.5">
              @for (item of group.items; track item.slug) {
                <li>
                  <a
                    [routerLink]="['/docs', item.slug]"
                    routerLinkActive="bg-accent text-foreground font-medium"
                    [routerLinkActiveOptions]="{ exact: true }"
                    (click)="closeSidebar()"
                    class="block rounded-md px-2 py-1.5 text-sm text-muted-foreground transition-colors hover:bg-accent/50 hover:text-foreground"
                  >
                    {{ item.label }}
                  </a>
                </li>
              }
            </ul>
          </div>
        }
      </nav>
    </aside>

  
    <main class="min-w-0 flex-1 px-6 py-8 lg:px-10 lg:py-10">
      <router-outlet />
    </main>
  </div>
</div>
